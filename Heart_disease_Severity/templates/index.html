<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>❤️ Heart Disease Prediction</h1>
        <p>Enter the patient's medical information</p>

        <form action="/predict" method="POST">

            <div class="grid">

                <div class="input-box">
                    <label>Age</label>
                    <input type="number" name="age" required>
                </div>

                <div class="input-box">
                    <label>Sex</label>
                    <select name="sex" required>
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Dataset</label>
                    <select name="dataset" required>
                        <option value="">Select</option>
                        <option value="Cleveland">Cleveland</option>
                        <option value="Hungary">Hungary</option>
                        <option value="Switzerland">Switzerland</option>
                        <option value="VA Long Beach">VA Long Beach</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Chest Pain Type</label>
                    <select name="cp" required>
                        <option value="">Select</option>
                        <option value="asymptomatic">Asymptomatic</option>
                        <option value="atypical angina">Atypical Angina</option>
                        <option value="non-anginal">Non-anginal</option>
                        <option value="typical angina">Typical Angina</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Resting Blood Pressure</label>
                    <input type="number" name="trestbps" required>
                </div>

                <div class="input-box">
                    <label>Cholesterol</label>
                    <input type="number" name="chol" required>
                </div>

                <div class="input-box">
                    <label>Fasting Blood Sugar >120 mg/dl</label>
                    <select name="fbs" required>
                        <option value="">Select</option>
                        <option value="False">False</option>
                        <option value="True">True</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Rest ECG</label>
                    <select name="restecg" required>
                        <option value="">Select</option>
                        <option value="lv hypertrophy">LV Hypertrophy</option>
                        <option value="normal">Normal</option>
                        <option value="st-t abnormality">ST-T Abnormality</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Maximum Heart Rate</label>
                    <input type="number" name="thalch" required>
                </div>

                <div class="input-box">
                    <label>Exercise Induced Angina</label>
                    <select name="exang" required>
                        <option value="">Select</option>
                        <option value="False">False</option>
                        <option value="True">True</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Old Peak</label>
                    <input type="number" step="0.1" name="oldpeak" required>
                </div>

                <div class="input-box">
                    <label>Slope</label>
                    <select name="slope" required>
                        <option value="">Select</option>
                        <option value="downsloping">Downsloping</option>
                        <option value="flat">Flat</option>
                        <option value="upsloping">Upsloping</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Thal</label>
                    <select name="thal" required>
                        <option value="">Select</option>
                        <option value="fixed defect">Fixed Defect</option>
                        <option value="normal">Normal</option>
                        <option value="reversable defect">Reversible Defect</option>
                    </select>
                </div>

            </div>

            <button type="submit">
                Predict Heart Disease
            </button>

        </form>

        {% if prediction_text %}
        <div class="result">
            <h2>{{ prediction_text }}</h2>
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
